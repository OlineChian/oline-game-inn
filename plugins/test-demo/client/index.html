<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试插件 - 插件路由验证</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="test-container">
    <h1>🧪 插件路由测试页面</h1>
    <p class="status">✅ 插件路由注册成功！</p>
    <div class="info">
      <p><strong>插件 ID:</strong> <span id="pluginId">test-demo</span></p>
      <p><strong>访问路径:</strong> <span id="routePath">/game/test-demo</span></p>
      <p><strong>CSS 加载:</strong> <span id="cssStatus" class="ok">✅ 已加载</span></p>
      <p><strong>JS 加载:</strong> <span id="jsStatus" class="ok">✅ 已加载</span></p>
    </div>
    <button id="testBtn" class="test-btn">点击测试</button>
    <p id="testResult" class="test-result"></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
