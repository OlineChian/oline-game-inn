<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>切斯特牌 - Oline荒野游戏客栈</title>
    <link rel="stylesheet" href="/common.css">
    <link rel="stylesheet" href="/game-header.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="has-game-header">
    <div id="site-game-header"></div>

    <main class="chester-stage" id="chesterStage">
        <!-- 阶段 0：骨架占位 -->
        <section class="stage-placeholder">
            <div class="placeholder-icon">🎪</div>
            <h1 class="placeholder-title">切斯特牌</h1>
            <p class="placeholder-subtitle">Balatro 风格扑克牌组合 · 糖果增益挑战</p>
            <p class="placeholder-tip">玩法开发中，敬请期待…</p>
        </section>

        <!-- 排行榜弹窗（标准模板） -->
        <div class="modal-overlay hidden" id="leaderboardModal">
            <div class="modal leaderboard-modal">
                <button class="close-modal" onclick="closeLeaderboard()">×</button>
                <div class="modal-icon">🏆</div>
                <h2>切斯特牌排行榜</h2>
                <p>得分越高，排名越高！</p>
                <div class="leaderboard-list" id="leaderboardList">
                    <div style="text-align:center;padding:20px;color:var(--text-muted);">加载中...</div>
                </div>
            </div>
        </div>
    </main>

    <script src="/game-header.js"></script>
    <script src="/score-signer.js"></script>
    <script>
        // 阶段 0：仅初始化顶部栏与排行榜弹窗骨架
        renderGameHeader({ title: '切斯特牌', backUrl: '/#games', showLeaderboard: true });

        function showLeaderboard() {
            document.getElementById('leaderboardModal').classList.remove('hidden');
            loadLeaderboard();
        }
        function closeLeaderboard() {
            document.getElementById('leaderboardModal').classList.add('hidden');
        }
        async function loadLeaderboard() {
            const list = document.getElementById('leaderboardList');
            list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted);">加载中...</div>';
            try {
                const res = await fetch('/api/leaderboard/chester-cards');
                const data = await res.json();
                if (data.success && data.leaderboard && data.leaderboard.length > 0) {
                    list.innerHTML = data.leaderboard.map((item, i) => `
                        <div class="leaderboard-item">
                            <div class="leaderboard-rank ${i < 3 ? 'rank-' + (i + 1) : 'rank-other'}">${i + 1}</div>
                            <div class="leaderboard-name">${escapeHtml(item.nickname)}</div>
                            <div class="leaderboard-score">${item.score}<span class="leaderboard-unit">${data.config.unit}</span></div>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = `
                        <div class="leaderboard-empty">
                            <div class="leaderboard-empty-icon">🎯</div>
                            <div>暂无排行记录</div>
                            <div style="font-size:12px;margin-top:5px;">快去挑战成为第一名吧！</div>
                        </div>
                    `;
                }
            } catch (e) {
                list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted);">加载失败</div>';
            }
        }
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        document.getElementById('leaderboardModal').addEventListener('click', function (e) {
            if (e.target === this) closeLeaderboard();
        });
    </script>
</body>
</html>
