<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>罗莎琥珀好姐妹 - Oline荒野游戏客栈</title>
    <link rel="stylesheet" href="/common.css">
    <link rel="stylesheet" href="/game-header.css">
    <style>
        :root {
            --color-rosa: #2ecc71;
            --color-amber: #e74c3c;
        }
        body.has-game-header { padding-top: 48px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: white;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            color: #2ecc71;
            text-shadow: 0 0 20px rgba(46, 204, 113, 0.5);
            margin-bottom: 10px;
        }
        .header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }
        .game-container {
            width: 100%;
            max-width: 500px;
        }
        
        /* 菜单 */
        #menuScreen {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.8);
        }
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            text-align: center;
            text-transform: uppercase;
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }
        .btn-rosa {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
        }
        .btn-amber {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        .btn:hover { transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }
        
        /* 等待 */
        #waitingScreen {
            display: none;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
        }
        .room-code-display {
            background: rgba(46, 204, 113, 0.2);
            padding: 20px 40px;
            border-radius: 15px;
            margin: 20px 0;
        }
        .room-code-display .code {
            font-size: 36px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 8px;
            color: #2ecc71;
        }
        .players-list { margin: 20px 0; }
        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .player-item.self { background: rgba(46, 204, 113, 0.2); border: 1px solid #2ecc71; }
        .status-msg { color: #f1c40f; margin: 15px 0; }
        
        /* 游戏 */
        #gameScreen {
            display: none;
            text-align: center;
        }
        .turn-indicator {
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
        }
        .turn-rosa { color: #2ecc71; }
        .turn-amber { color: #e74c3c; }
        .global-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            width: 100%;
            max-width: 360px;
            margin: 0 auto;
        }
        .mini-board {
            aspect-ratio: 1;
            min-width: 0;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 5px;
            cursor: pointer;
        }
        .mini-board.disabled { opacity: 0.5; cursor: not-allowed; }
        .mini-board.winner-rosa { background: rgba(46, 204, 113, 0.3); }
        .mini-board.winner-amber { background: rgba(231, 76, 60, 0.3); }
        .cell {
            min-width: 0;
            min-height: 0;
            overflow: hidden;
            aspect-ratio: 1;
            line-height: 1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(16px, 4.5vw, 28px);
            cursor: pointer;
            transition: all 0.2s;
        }
        .cell:hover:not(.taken) { background: rgba(255, 255, 255, 0.15); }
        .cell.rosa { color: #2ecc71; }
        .cell.amber { color: #e74c3c; }
        .cell.taken { cursor: not-allowed; }
        
        /* 结果 */
        #resultScreen {
            display: none;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
        }
        .result-title { font-size: 48px; margin-bottom: 20px; }
        .result-details { font-size: 18px; line-height: 1.8; margin-bottom: 30px; }
        
        .back-link {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
        }
        .back-link:hover { color: #2ecc71; }

        /* 单人模式：难度选择 */
        .solo-diff-group { margin: 20px 0; }
        .solo-diff-group label {
            display: block;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }
        .solo-diff-btns {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .solo-diff-btn {
            flex: 1;
            min-width: 80px;
            padding: 10px 8px !important;
            font-size: 14px !important;
            margin: 0 !important;
            border: 2px solid rgba(255, 255, 255, 0.2) !important;
            background: rgba(255, 255, 255, 0.05) !important;
            color: rgba(255, 255, 255, 0.7) !important;
        }
        .solo-diff-btn.active {
            border-color: #2ecc71 !important;
            background: rgba(46, 204, 113, 0.2) !important;
            color: #2ecc71 !important;
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.4);
        }
        .solo-start-group { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }

        /* 排行榜弹窗 */
        .lb-modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .lb-modal-overlay.hidden { display: none; }
        .lb-modal {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 2px solid #2ecc71;
            border-radius: 15px;
            padding: 30px 24px 24px;
            max-width: 480px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.4);
            position: relative;
        }
        .lb-modal-close {
            position: absolute;
            top: 12px; right: 12px;
            background: transparent;
            border: 1px solid #2ecc71;
            color: #2ecc71;
            width: 30px; height: 30px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .lb-modal-close:hover { background: rgba(46, 204, 113, 0.15); }
        .lb-modal-title {
            text-align: center;
            color: #2ecc71;
            font-size: 22px;
            margin-bottom: 4px;
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.6);
        }
        .lb-modal-subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            margin-bottom: 14px;
        }
        .lb-diff-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .lb-diff-tab {
            padding: 6px 14px;
            border: 1px solid rgba(46, 204, 113, 0.3);
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lb-diff-tab:hover { background: rgba(46, 204, 113, 0.1); }
        .lb-diff-tab.active {
            background: rgba(46, 204, 113, 0.25);
            color: #2ecc71;
            border-color: #2ecc71;
        }
        .lb-list { display: flex; flex-direction: column; gap: 8px; }
        .lb-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            background: rgba(46, 204, 113, 0.05);
            border-radius: 8px;
            border: 1px solid rgba(46, 204, 113, 0.15);
        }
        .lb-rank {
            width: 30px; height: 30px;
            border-radius: 50%;
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 12px;
            flex-shrink: 0;
            font-size: 14px;
        }
        .lb-item.rank-1 .lb-rank { background: #f1c40f; color: #1a1a2e; }
        .lb-item.rank-2 .lb-rank { background: #bdc3c7; color: #1a1a2e; }
        .lb-item.rank-3 .lb-rank { background: #cd7f32; color: #1a1a2e; }
        .lb-name {
            flex: 1;
            color: white;
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .lb-score {
            color: #2ecc71;
            font-weight: bold;
            font-size: 16px;
        }
        .lb-score .lb-unit {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            font-weight: normal;
            margin-left: 3px;
        }
        .lb-empty {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.5);
        }
        .lb-empty-icon { font-size: 48px; margin-bottom: 12px; }
        .lb-empty p { margin-top: 4px; font-size: 13px; }
    </style>
</head>
<body class="has-game-header">
    <div id="site-game-header"></div>
    <script src="/game-header.js"></script>
    <script>
        renderGameHeader({ title: '罗莎琥珀好姐妹', backUrl: '/#games', showLeaderboard: true });
    </script>
    <div class="header">
        <h1>🌿 罗莎琥珀好姐妹</h1>
        <p>终极井字棋联机对战</p>
    </div>
    
    <div class="game-container">
        <!-- 菜单 -->
        <div id="menuScreen">
            <div class="input-group">
                <label>你的昵称</label>
                <input type="text" id="nicknameInput" placeholder="输入昵称" maxlength="10">
            </div>
            <button class="btn btn-rosa" id="createRoomBtn">🌿 创建房间（罗莎）</button>
            <div style="margin: 15px 0; color: rgba(255,255,255,0.4);">或者</div>
            <div class="input-group">
                <label>输入房间码</label>
                <input type="text" id="roomCodeInput" placeholder="6位房间码" maxlength="6">
            </div>
            <button class="btn btn-secondary" id="joinRoomBtn">🚪 加入房间</button>

            <div style="margin: 15px 0; color: rgba(255,255,255,0.4);">或者</div>

            <button class="btn btn-rosa" id="soloModeBtn">
                🎯 单人模式（VS 电脑）
            </button>
        </div>

        <!-- 单人模式：选择难度与执棋 -->
        <div id="soloMenuScreen" style="display: none; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 30px; text-align: center;">
            <h3 style="margin-bottom: 15px;">🎯 单人对战</h3>
            <p style="color: rgba(255,255,255,0.6); margin-bottom: 20px;">你执 <span style="color:#2ecc71;font-weight:bold;">罗莎(绿)</span>，电脑执 <span style="color:#e74c3c;font-weight:bold;">琥珀(红)</span></p>

            <div class="solo-diff-group">
                <label>选择 AI 难度</label>
                <div class="solo-diff-btns">
                    <button class="btn btn-secondary solo-diff-btn active" data-diff="easy">😊 简单</button>
                    <button class="btn btn-secondary solo-diff-btn" data-diff="normal">😐 中等</button>
                    <button class="btn btn-secondary solo-diff-btn" data-diff="hard">😈 困难</button>
                </div>
            </div>

            <div class="solo-start-group">
                <button class="btn btn-rosa" id="soloStartRosaBtn">🌿 执绿棋（先手）开始</button>
                <button class="btn btn-amber" id="soloStartAmberBtn">🔴 执红棋（后手）开始</button>
            </div>

            <div style="margin-top: 20px;">
                <button class="btn btn-secondary" id="soloBackBtn">← 返回</button>
            </div>
        </div>

        <!-- 单人模式：游戏 -->
        <div id="soloGameScreen" style="display: none; text-align: center;">
            <p style="color: rgba(255,255,255,0.7); margin-bottom: 10px;">单人模式 · 第 <span id="soloRoundNum">1</span>/3 局</p>
            <div class="turn-indicator" id="soloTurnIndicator">等待开始...</div>
            <div class="global-board" id="soloGlobalBoard"></div>
            <button class="btn btn-secondary" id="soloQuitBtn" style="margin-top: 15px;">← 退出单人模式</button>
        </div>

        <!-- 单人模式：结果 -->
        <div id="soloResultScreen" style="display: none; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 40px 30px; text-align: center;">
            <div class="result-title" id="soloResultTitle">🎉</div>
            <div class="result-details" id="soloResultDetails"></div>
            <div id="soloBestDisplay" style="color: #f1c40f; margin: 15px 0;"></div>
            <button class="btn btn-rosa" id="soloNextBtn">🔄 下一局</button>
            <button class="btn btn-secondary" id="soloFinishBtn" style="margin-top: 10px;">🏁 结束挑战</button>
        </div>
        
        <!-- 等待 -->
        <div id="waitingScreen">
            <h2>房间已创建！</h2>
            <div class="room-code-display">
                <div>房间码</div>
                <div class="code" id="displayRoomCode">------</div>
            </div>
            <button class="btn btn-secondary" id="copyRoomBtn">📋 复制房间码</button>
            <div class="players-list" id="playersList"></div>
            <div class="status-msg" id="statusMsg">等待对手加入...</div>
            <button class="btn btn-secondary" id="leaveRoomBtn">🚪 离开房间</button>
        </div>
        
        <!-- 游戏 -->
        <div id="gameScreen">
            <div class="turn-indicator" id="turnIndicator">等待开始...</div>
            <div class="global-board" id="globalBoard"></div>
            <button class="btn btn-secondary" id="backBtn" style="margin-top: 15px;">← 返回</button>
        </div>
        
        <!-- 结果 -->
        <div id="resultScreen">
            <div class="result-title" id="resultTitle">🎉</div>
            <div class="result-details" id="resultDetails"></div>
            <button class="btn btn-rosa" id="restartBtn">🔄 再来一局</button>
            <a href="/#games" class="back-link">← 返回游戏大厅</a>
        </div>
    </div>

    <!-- 排行榜弹窗（带难度切换） -->
    <div class="lb-modal-overlay hidden" id="leaderboardModal">
        <div class="lb-modal">
            <button class="lb-modal-close" onclick="closeLeaderboard()">×</button>
            <div class="lb-modal-title">🏆 罗莎琥珀排行榜</div>
            <div class="lb-modal-subtitle">累计胜场越多，排名越高</div>
            <div class="lb-diff-tabs" id="lbDiffTabs">
                <button class="lb-diff-tab active" data-diff="">全部</button>
                <button class="lb-diff-tab" data-diff="easy">😊 简单</button>
                <button class="lb-diff-tab" data-diff="normal">😐 中等</button>
                <button class="lb-diff-tab" data-diff="hard">😈 困难</button>
            </div>
            <div class="lb-list" id="lbList">
                <div class="lb-empty"><div class="lb-empty-icon">🌿</div><p>加载中...</p></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="index.js"></script>
</body>
</html>
