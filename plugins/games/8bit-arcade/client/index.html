<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8比特街机 - Oline荒野游戏客栈</title>
    <link rel="stylesheet" href="/common.css">
    <link rel="stylesheet" href="/game-header.css">
    <style>
        :root {
            --color-accent: #00ff88;
            --color-accent-dark: #00cec9;
            --color-bg: #0f0f23;
            --color-bg-panel: rgba(0, 0, 0, 0.3);
            --color-text-muted: #888;
            --color-danger: #e74c3c;
            --color-gold: #f1c40f;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            -moz-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 3vw 2vh 3vw;
            color: white;
            overflow-x: hidden;
        }
        .header {
            text-align: center;
            margin-bottom: 2vh;
        }
        .header h1 {
            font-size: clamp(20px, 5vw, 36px);
            color: var(--color-accent);
            text-shadow: 0 0 10px var(--color-accent);
            margin-bottom: 0.5vh;
            letter-spacing: 2px;
        }
        .header p {
            color: var(--color-text-muted);
            font-size: clamp(11px, 2.5vw, 14px);
        }
        .game-container {
            background: var(--color-bg-panel);
            border-radius: 15px;
            padding: 3vh 4vw;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
            border: 2px solid rgba(0, 255, 136, 0.3);
            width: 100%;
            max-width: 600px;
        }

        /* 通用按钮 */
        .btn {
            padding: 12px 30px;
            border: 2px solid var(--color-accent);
            background: transparent;
            color: var(--color-accent);
            border-radius: 10px;
            font-size: clamp(13px, 3vw, 16px);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:hover {
            background: rgba(0, 255, 136, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }
        .btn:active { transform: scale(0.95); }
        .btn-primary {
            background: var(--color-accent);
            color: var(--color-bg);
        }
        .btn-primary:hover {
            box-shadow: 0 0 25px var(--color-accent);
        }
        .btn-secondary {
            border-color: #666;
            color: var(--color-text-muted);
        }
        .btn-secondary:hover {
            background: rgba(102, 102, 102, 0.1);
            box-shadow: none;
        }

        /* 输入与选择 */
        .input-group { margin-bottom: 15px; }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            text-align: center;
            font-family: 'Courier New', monospace;
        }
        .input-group input::placeholder { color: rgba(255, 255, 255, 0.4); }
        .difficulty-select { margin: 15px 0; }
        .difficulty-select label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }
        .difficulty-select select {
            width: 100%;
            padding: 10px 15px;
            border-radius: 10px;
            border: 2px solid rgba(0, 255, 136, 0.3);
            background: rgba(0, 0, 0, 0.3);
            color: var(--color-accent);
            font-size: 14px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
        }
        .difficulty-select select option { background: #1a1a2e; color: white; }
        .divider {
            margin: 20px 0;
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            font-size: 13px;
        }

        /* 房间等待屏 */
        .room-code-display {
            background: rgba(0, 255, 136, 0.15);
            padding: 20px 40px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: center;
        }
        .room-code-display .label {
            color: var(--color-text-muted);
            font-size: 12px;
            margin-bottom: 8px;
        }
        .room-code-display .code {
            font-size: 36px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 8px;
            color: var(--color-accent);
            text-shadow: 0 0 10px var(--color-accent);
        }
        .players-list { margin: 20px 0; }
        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .player-item.self {
            background: rgba(0, 255, 136, 0.15);
            border: 1px solid var(--color-accent);
        }
        .player-name { font-weight: bold; }
        .player-role { color: var(--color-text-muted); font-size: 12px; }
        .status-msg {
            color: var(--color-gold);
            margin: 15px 0;
            font-size: 14px;
            text-align: center;
        }

        /* 游戏屏 */
        .game-info {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: var(--color-bg-panel);
            border-radius: 15px;
            margin-bottom: 15px;
        }
        .info-item { text-align: center; }
        .info-label {
            font-size: 12px;
            color: var(--color-text-muted);
            margin-bottom: 5px;
        }
        .info-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--color-accent);
        }
        .info-value.opponent { color: var(--color-danger); }
        #gameCanvas, #soloCanvas {
            background: var(--color-bg);
            border-radius: 12px;
            border: 3px solid rgba(0, 255, 136, 0.3);
            max-width: 100%;
            touch-action: manipulation;
            display: block;
            margin: 0 auto;
        }
        .hint {
            color: var(--color-text-muted);
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
        }
        .game-controls {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .mobile-controls {
            display: none;
            justify-content: space-between;
            margin-top: 15px;
            padding: 0 10px;
        }
        .mobile-control-group {
            display: flex;
            gap: 10px;
        }
        .mobile-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid var(--color-accent);
            background: rgba(0, 255, 136, 0.1);
            color: var(--color-accent);
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .mobile-btn:active { background: rgba(0, 255, 136, 0.3); }
        @media (max-width: 768px) {
            .mobile-controls { display: flex; }
        }

        /* 结果屏 */
        .result-title {
            font-size: clamp(28px, 6vw, 48px);
            margin-bottom: 20px;
            text-align: center;
        }
        .result-details {
            font-size: 18px;
            line-height: 1.8;
            margin-bottom: 30px;
            text-align: center;
        }
        .result-details p { margin: 10px 0; }
        .result-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .back-link {
            margin-top: 20px;
            color: var(--color-text-muted);
            text-decoration: none;
            font-size: 14px;
            text-align: center;
            display: inline-block;
        }
        .back-link:hover {
            color: var(--color-accent);
            text-decoration: underline;
        }
        .error-msg {
            color: var(--color-danger);
            font-size: 12px;
            margin-top: 5px;
            min-height: 16px;
            text-align: center;
        }

        /* 屏幕切换 */
        .screen { display: none; }
        .screen.active { display: block; }

        /* 排行榜弹窗（霓虹像素风） */
        .lb-modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .lb-modal-overlay.hidden { display: none; }
        .lb-modal {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 2px solid var(--color-accent);
            border-radius: 15px;
            padding: 30px 24px 24px;
            max-width: 480px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
            position: relative;
        }
        .lb-modal-close {
            position: absolute;
            top: 12px; right: 12px;
            background: transparent;
            border: 1px solid var(--color-accent);
            color: var(--color-accent);
            width: 30px; height: 30px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .lb-modal-close:hover { background: rgba(0, 255, 136, 0.15); }
        .lb-modal-title {
            text-align: center;
            color: var(--color-accent);
            font-size: 22px;
            margin-bottom: 4px;
            text-shadow: 0 0 10px var(--color-accent);
            letter-spacing: 1px;
        }
        .lb-modal-subtitle {
            text-align: center;
            color: var(--color-text-muted);
            font-size: 12px;
            margin-bottom: 18px;
        }
        .lb-list { display: flex; flex-direction: column; gap: 8px; }
        .lb-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            background: rgba(0, 255, 136, 0.05);
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 136, 0.15);
        }
        .lb-rank {
            width: 30px; height: 30px;
            border-radius: 50%;
            background: rgba(0, 255, 136, 0.2);
            color: var(--color-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 12px;
            flex-shrink: 0;
            font-size: 14px;
        }
        .lb-item.rank-1 .lb-rank { background: #f1c40f; color: #1a1a2e; }
        .lb-item.rank-2 .lb-rank { background: #bdc3c7; color: #1a1a2e; }
        .lb-item.rank-3 .lb-rank { background: #cd7f32; color: #1a1a2e; }
        .lb-name {
            flex: 1;
            color: white;
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .lb-score {
            color: var(--color-accent);
            font-weight: bold;
            font-size: 16px;
        }
        .lb-score .lb-unit {
            color: var(--color-text-muted);
            font-size: 11px;
            font-weight: normal;
            margin-left: 3px;
        }
        .lb-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--color-text-muted);
        }
        .lb-empty-icon { font-size: 48px; margin-bottom: 12px; }
        .lb-empty p { margin-top: 4px; font-size: 13px; }
    </style>
</head>
<body class="has-game-header">
    <div id="site-game-header"></div>
    <script src="/game-header.js"></script>
    <script>
        renderGameHeader({ title: '8比特街机', backUrl: '/#games', showLeaderboard: true });
    </script>

    <div class="header">
        <h1>🕹️ 8比特街机</h1>
        <p>经典像素跑酷联机对战 · 比拼最高分</p>
    </div>

    <div class="game-container">
        <!-- 菜单屏 -->
        <div id="menuScreen" class="screen active">
            <div class="input-group">
                <label>你的昵称</label>
                <input type="text" id="nicknameInput" placeholder="输入昵称" maxlength="12" autocomplete="off">
            </div>

            <div class="difficulty-select">
                <label>选择难度</label>
                <select id="difficultySelect">
                    <option value="easy">😊 简单（慢速起步）</option>
                    <option value="normal" selected>😐 中等（标准节奏）</option>
                    <option value="hard">😈 困难（高速挑战）</option>
                </select>
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <button class="btn btn-primary" id="createRoomBtn">🎮 创建房间</button>
            </div>

            <div class="divider">— 或者 —</div>

            <div class="input-group">
                <label>输入房间码加入</label>
                <input type="text" id="roomCodeInput" placeholder="6位房间码" maxlength="6" autocomplete="off">
            </div>
            <div class="error-msg" id="joinError"></div>

            <div style="text-align: center;">
                <button class="btn btn-secondary" id="joinRoomBtn">🚪 加入房间</button>
            </div>

            <div class="divider">— 或者 —</div>

            <div style="text-align: center;">
                <button class="btn btn-primary" id="soloModeBtn">🎯 单人练习</button>
            </div>
            <div class="hint">单人模式随时重玩，记录会同步到排行榜</div>
        </div>

        <!-- 等待屏 -->
        <div id="waitingScreen" class="screen">
            <h2 style="text-align: center; margin-bottom: 15px;">房间已创建</h2>
            <div class="room-code-display">
                <div class="label">房间码（分享给对手）</div>
                <div class="code" id="displayRoomCode">------</div>
            </div>
            <div style="text-align: center; margin-bottom: 15px;">
                <button class="btn btn-secondary" id="copyRoomBtn">📋 复制房间码</button>
            </div>
            <div class="players-list" id="playersList"></div>
            <div class="status-msg" id="statusMsg">等待对手加入...</div>
            <div class="game-controls">
                <button class="btn btn-primary" id="startGameBtn" style="display: none;">🚀 开始游戏</button>
                <button class="btn btn-secondary" id="leaveRoomBtn">🚪 离开房间</button>
            </div>
        </div>

        <!-- 联机游戏屏 -->
        <div id="gameScreen" class="screen">
            <div class="game-info">
                <div class="info-item">
                    <div class="info-label">🎮 你的得分</div>
                    <div class="info-value" id="localScore">0</div>
                </div>
                <div class="info-item">
                    <div class="info-label">👤 对手得分</div>
                    <div class="info-value opponent" id="opponentScore">0</div>
                </div>
            </div>
            <canvas id="gameCanvas" width="500" height="320"></canvas>
            <div class="hint">空格/点击 跳跃(二段跳) · ←→/AD 左右移动 · ↓/S 下蹲躲避飞鸟</div>
            <div class="mobile-controls">
                <div class="mobile-control-group">
                    <button class="mobile-btn" id="leftBtn">⬅️</button>
                    <button class="mobile-btn" id="rightBtn">➡️</button>
                </div>
                <div class="mobile-control-group">
                    <button class="mobile-btn" id="duckBtn">⬇️</button>
                    <button class="mobile-btn" id="jumpBtn">⬆️</button>
                </div>
            </div>
            <div class="game-controls">
                <button class="btn btn-secondary" id="backToMenuBtn">← 返回菜单</button>
            </div>
        </div>

        <!-- 联机结果屏 -->
        <div id="resultScreen" class="screen">
            <div class="result-title" id="resultTitle">🎉 获胜！</div>
            <div class="result-details" id="resultDetails"></div>
            <div class="result-actions">
                <button class="btn btn-primary" id="restartGameBtn">🔄 再来一局</button>
                <button class="btn btn-secondary" id="backToMenuFromResultBtn">← 返回菜单</button>
            </div>
            <div style="text-align: center;">
                <a href="/#games" class="back-link">← 返回游戏大厅</a>
            </div>
        </div>

        <!-- 单人游戏屏 -->
        <div id="soloScreen" class="screen">
            <div class="game-info">
                <div class="info-item">
                    <div class="info-label">🎯 本局得分</div>
                    <div class="info-value" id="soloScore">0</div>
                </div>
                <div class="info-item">
                    <div class="info-label">🏆 历史最高</div>
                    <div class="info-value" id="soloBest">0</div>
                </div>
            </div>
            <canvas id="soloCanvas" width="500" height="320"></canvas>
            <div class="hint">空格/点击 跳跃(二段跳) · ←→/AD 左右移动 · ↓/S 下蹲躲避飞鸟</div>
            <div class="mobile-controls">
                <div class="mobile-control-group">
                    <button class="mobile-btn" id="soloLeftBtn">⬅️</button>
                    <button class="mobile-btn" id="soloRightBtn">➡️</button>
                </div>
                <div class="mobile-control-group">
                    <button class="mobile-btn" id="soloDuckBtn">⬇️</button>
                    <button class="mobile-btn" id="soloJumpBtn">⬆️</button>
                </div>
            </div>
            <div class="game-controls">
                <button class="btn btn-secondary" id="soloQuitBtn">← 返回菜单</button>
            </div>
        </div>

        <!-- 单人结果屏 -->
        <div id="soloResultScreen" class="screen">
            <div class="result-title" id="soloResultTitle">🏁 本局结束</div>
            <div class="result-details" id="soloResultDetails"></div>
            <div class="result-actions">
                <button class="btn btn-primary" id="soloRetryBtn">🔄 再来一局</button>
                <button class="btn btn-secondary" id="soloBackBtn">← 返回菜单</button>
            </div>
            <div style="text-align: center;">
                <a href="/#games" class="back-link">← 返回游戏大厅</a>
            </div>
        </div>
    </div>

    <!-- 排行榜弹窗 -->
    <div class="lb-modal-overlay hidden" id="leaderboardModal">
        <div class="lb-modal">
            <button class="lb-modal-close" onclick="closeLeaderboard()">×</button>
            <div class="lb-modal-title">🏆 8比特街机排行榜</div>
            <div class="lb-modal-subtitle">分数越高，排名越靠前</div>
            <div class="lb-list" id="lbList">
                <div class="lb-empty"><div class="lb-empty-icon">🎮</div><p>加载中...</p></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/anti-cheat-monitor.js"></script>
    <script src="/session-guard.js"></script>
    <script src="/ban-notice.js"></script>
    <script src="/score-signer.js"></script>
    <script src="index.js"></script>
</body>
</html>
