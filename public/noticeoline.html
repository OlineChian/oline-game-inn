<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公告管理</title>
<style>
:root {
  --bg: #f5f6f8; --card: #fff; --border: #e2e5ea; --text: #1f2329; --muted: #8a9099;
  --primary: #4f7cff; --primary-hover: #3a63d8;
  --danger: #e5484d; --success: #30a46c; --warn: #f5a623;
  --info: #74b9ff; --event: #f5a623; --update: #30a46c; --urgent: #e5484d; --welcome: #a78bfa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding: 20px; }
.container { max-width: 900px; margin: 0 auto; }
h1 { font-size: 22px; margin-bottom: 4px; }
.subtitle { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
.token-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; }
.token-bar label { font-size: 13px; color: var(--muted); white-space: nowrap; }
.token-bar input { flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; }
.tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 2px solid var(--border); }
.tab { padding: 8px 18px; border: none; background: none; cursor: pointer; font-size: 14px; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px; }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
.tab-pane { display: none; }
.tab-pane.active { display: block; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 18px; margin-bottom: 16px; }
.card h2 { font-size: 16px; margin-bottom: 14px; }
.form-row { margin-bottom: 12px; }
.form-row label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
.form-row input, .form-row textarea, .form-row select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 14px; font-family: inherit; }
.form-row textarea { min-height: 120px; resize: vertical; line-height: 1.6; }
.form-inline { display: flex; gap: 10px; align-items: flex-end; }
.form-inline .form-row { flex: 1; }
.btn { padding: 8px 18px; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; transition: opacity .15s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-secondary { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg); }
.templates { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px dashed var(--border); }
.template-btn { padding: 5px 12px; font-size: 12px; border: 1px solid var(--border); background: var(--bg); border-radius: 4px; cursor: pointer; color: var(--text); }
.template-btn:hover { border-color: var(--primary); color: var(--primary); }
table { width: 100%; border-collapse: collapse; }
th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--border); font-size: 13px; }
th { color: var(--muted); font-weight: 600; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; color: #fff; }
.badge-info { background: var(--info); }
.badge-event { background: var(--event); }
.badge-update { background: var(--update); }
.badge-urgent { background: var(--urgent); }
.badge-active { background: var(--success); }
.badge-inactive { background: var(--muted); }
.status { position: fixed; top: 20px; right: 20px; padding: 10px 18px; border-radius: 6px; font-size: 14px; z-index: 999; opacity: 0; transition: opacity .2s; }
.status.show { opacity: 1; }
.status-ok { background: var(--success); color: #fff; }
.status-err { background: var(--danger); color: #fff; }
.empty { text-align: center; padding: 30px; color: var(--muted); font-size: 14px; }
.toggle-active { display: inline-flex; align-items: center; gap: 6px; }
.toggle-active input { margin: 0; }
</style>
</head>
<body>
<div class="container">
  <h1>公告管理</h1>
  <div class="subtitle">发布、编辑公告；管理迎新公告 | 访问地址 /gg</div>

  <div class="token-bar">
    <label>ADMIN_TOKEN：</label>
    <input type="password" id="adminToken" placeholder="未设置 ADMIN_TOKEN 时留空">
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="list" onclick="switchTab('list')">公告列表</button>
    <button class="tab" data-tab="create" onclick="switchTab('create')">新建公告</button>
    <button class="tab" data-tab="welcome" onclick="switchTab('welcome')">迎新公告</button>
  </div>

  <!-- Tab 1: 公告列表 -->
  <div class="tab-pane active" id="pane-list">
    <div class="card">
      <h2>已发布公告</h2>
      <table id="noticeTable">
        <thead>
          <tr><th>标题</th><th>类型</th><th>落款</th><th>状态</th><th>创建时间</th><th>操作</th></tr>
        </thead>
        <tbody id="noticeBody"></tbody>
      </table>
      <div class="empty" id="noticeEmpty" style="display:none;">暂无公告</div>
    </div>
  </div>

  <!-- Tab 2: 新建/编辑公告 -->
  <div class="tab-pane" id="pane-create">
    <div class="card">
      <h2 id="formTitle">新建公告</h2>
      <div class="templates" id="templateBar"></div>
      <input type="hidden" id="editId">
      <div class="form-row">
        <label>标题</label>
        <input type="text" id="title" placeholder="公告标题">
      </div>
      <div class="form-inline">
        <div class="form-row" style="flex:0 0 200px;">
          <label>类型（决定弹窗配色）</label>
          <select id="type">
            <option value="info">普通公告（橙）</option>
            <option value="event">活动公告（金）</option>
            <option value="update">更新公告（绿）</option>
            <option value="urgent">紧急公告（红）</option>
          </select>
        </div>
        <div class="form-row" style="flex:0 0 200px;">
          <label>落款</label>
          <input type="text" id="signature" placeholder="如：Oline 客栈管理组">
        </div>
        <div class="form-row" style="flex:0 0 auto;">
          <label>启用</label>
          <label class="toggle-active"><input type="checkbox" id="active" checked> 发布后立即生效</label>
        </div>
      </div>
      <div class="form-row">
        <label>内容（支持多行）</label>
        <textarea id="content" placeholder="公告正文..."></textarea>
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-primary" onclick="saveNotice()">保存公告</button>
        <button class="btn btn-secondary" onclick="resetForm()">清空表单</button>
      </div>
    </div>
  </div>

  <!-- Tab 3: 迎新公告 -->
  <div class="tab-pane" id="pane-welcome">
    <div class="card">
      <h2>迎新公告（首次访问的玩家展示一次）</h2>
      <div class="form-row">
        <label>标题</label>
        <input type="text" id="wTitle" placeholder="迎新公告标题">
      </div>
      <div class="form-inline">
        <div class="form-row" style="flex:0 0 200px;">
          <label>落款</label>
          <input type="text" id="wSignature" placeholder="如：Oline 客栈管理组">
        </div>
        <div class="form-row" style="flex:0 0 auto;">
          <label>启用</label>
          <label class="toggle-active"><input type="checkbox" id="wActive" checked> 启用迎新公告</label>
        </div>
      </div>
      <div class="form-row">
        <label>内容（支持多行）</label>
        <textarea id="wContent" placeholder="迎新公告正文..."></textarea>
      </div>
      <button class="btn btn-primary" onclick="saveWelcome()">保存迎新公告</button>
    </div>
  </div>
</div>

<div class="status" id="status"></div>

<script>
var adminToken = '';
var templates = [];
var activeTab = 'list';

(function initToken() {
  var saved = localStorage.getItem('adminToken');
  if (saved) { document.getElementById('adminToken').value = saved; adminToken = saved; }
})();
document.getElementById('adminToken').addEventListener('change', function() {
  adminToken = this.value.trim();
  localStorage.setItem('adminToken', adminToken);
});
function authHeaders() {
  var h = {};
  if (adminToken) h['x-admin-token'] = adminToken;
  return h;
}
function showStatus(msg, isOk) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status show ' + (isOk ? 'status-ok' : 'status-err');
  setTimeout(function() { el.className = 'status'; }, 2500);
}
function switchTab(name) {
  activeTab = name;
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.toggle('active', t.dataset.tab === name); });
  document.querySelectorAll('.tab-pane').forEach(function(p) { p.classList.toggle('active', p.id === 'pane-' + name); });
  if (name === 'list') loadNotices();
  if (name === 'welcome') loadWelcome();
  if (name === 'create' && templates.length === 0) loadTemplates();
}
function formatDate(ts) {
  if (!ts) return '-';
  var d = new Date(ts);
  var p = function(x) { return x < 10 ? '0' + x : x; };
  return d.getFullYear() + '-' + p(d.getMonth()+1) + '-' + p(d.getDate()) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
}
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

// ===== 公告列表 =====
function loadNotices() {
  fetch('/api/notice/list', { headers: authHeaders() })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var body = document.getElementById('noticeBody');
      var empty = document.getElementById('noticeEmpty');
      if (!data.success) { showStatus(data.error || '加载失败', false); return; }
      var list = data.notices || [];
      if (list.length === 0) { body.innerHTML = ''; empty.style.display = 'block'; return; }
      empty.style.display = 'none';
      body.innerHTML = list.map(function(n) {
        return '<tr>' +
          '<td>' + escapeHtml(n.title) + '</td>' +
          '<td><span class="badge badge-' + n.type + '">' + n.type + '</span></td>' +
          '<td>' + escapeHtml(n.signature || '-') + '</td>' +
          '<td><span class="badge ' + (n.active ? 'badge-active' : 'badge-inactive') + '">' + (n.active ? '启用' : '停用') + '</span></td>' +
          '<td>' + formatDate(n.createdAt) + '</td>' +
          '<td><button class="btn btn-sm btn-secondary" onclick="editNotice(\'' + n.id + '\')">编辑</button> ' +
          '<button class="btn btn-sm btn-danger" onclick="deleteNotice(\'' + n.id + '\')">删除</button></td>' +
          '</tr>';
      }).join('');
    })
    .catch(function(e) { showStatus('网络错误: ' + e.message, false); });
}

// ===== 模板 =====
function loadTemplates() {
  fetch('/api/notice/templates')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.success) return;
      templates = data.templates || [];
      var bar = document.getElementById('templateBar');
      bar.innerHTML = '<span style="font-size:12px;color:var(--muted);align-self:center;">参考模板：</span>' +
        templates.map(function(t, i) {
          return '<button class="template-btn" onclick="applyTemplate(' + i + ')">' + escapeHtml(t.name) + '</button>';
        }).join('');
    });
}
function applyTemplate(idx) {
  var t = templates[idx];
  if (!t) return;
  document.getElementById('title').value = t.title;
  document.getElementById('content').value = t.content;
  document.getElementById('signature').value = t.signature;
  document.getElementById('type').value = t.type;
  showStatus('已载入模板：' + t.name, true);
}

// ===== 新建/编辑 =====
function saveNotice() {
  var id = document.getElementById('editId').value;
  var body = {
    title: document.getElementById('title').value,
    content: document.getElementById('content').value,
    signature: document.getElementById('signature').value,
    type: document.getElementById('type').value,
    active: document.getElementById('active').checked
  };
  if (!body.title.trim() || !body.content.trim()) { showStatus('标题和内容不能为空', false); return; }
  var method = id ? 'PUT' : 'POST';
  var url = id ? '/api/notice/' + id : '/api/notice';
  fetch(url, { method: method, headers: Object.assign({'Content-Type':'application/json'}, authHeaders()), body: JSON.stringify(body) })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) { showStatus(id ? '已更新' : '已创建', true); resetForm(); switchTab('list'); }
      else showStatus(data.error || '保存失败', false);
    })
    .catch(function(e) { showStatus('网络错误: ' + e.message, false); });
}
function editNotice(id) {
  fetch('/api/notice/list', { headers: authHeaders() })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.success) return;
      var n = (data.notices || []).find(function(x) { return x.id === id; });
      if (!n) return;
      document.getElementById('editId').value = n.id;
      document.getElementById('title').value = n.title;
      document.getElementById('content').value = n.content;
      document.getElementById('signature').value = n.signature || '';
      document.getElementById('type').value = n.type;
      document.getElementById('active').checked = n.active;
      document.getElementById('formTitle').textContent = '编辑公告';
      switchTab('create');
    });
}
function deleteNotice(id) {
  if (!confirm('确认删除这条公告？')) return;
  fetch('/api/notice/' + id, { method: 'DELETE', headers: authHeaders() })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) { showStatus('已删除', true); loadNotices(); }
      else showStatus(data.error || '删除失败', false);
    });
}
function resetForm() {
  document.getElementById('editId').value = '';
  document.getElementById('title').value = '';
  document.getElementById('content').value = '';
  document.getElementById('signature').value = '';
  document.getElementById('type').value = 'info';
  document.getElementById('active').checked = true;
  document.getElementById('formTitle').textContent = '新建公告';
}

// ===== 迎新公告 =====
function loadWelcome() {
  fetch('/api/notice/welcome', { headers: authHeaders() })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.success) { showStatus(data.error || '加载失败', false); return; }
      var w = data.welcome || {};
      document.getElementById('wTitle').value = w.title || '';
      document.getElementById('wContent').value = w.content || '';
      document.getElementById('wSignature').value = w.signature || '';
      document.getElementById('wActive').checked = w.active !== false;
    });
}
function saveWelcome() {
  var body = {
    title: document.getElementById('wTitle').value,
    content: document.getElementById('wContent').value,
    signature: document.getElementById('wSignature').value,
    active: document.getElementById('wActive').checked
  };
  if (!body.title.trim() || !body.content.trim()) { showStatus('标题和内容不能为空', false); return; }
  fetch('/api/notice/welcome', { method: 'PUT', headers: Object.assign({'Content-Type':'application/json'}, authHeaders()), body: JSON.stringify(body) })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) showStatus('迎新公告已保存', true);
      else showStatus(data.error || '保存失败', false);
    });
}

// 初始化
loadNotices();
</script>
</body>
</html>
